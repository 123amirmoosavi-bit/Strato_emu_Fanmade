name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK, NDK & CMake
      uses: android-actions/setup-android@v3
      with:
        packages: 'ndk;25.2.9519653 cmake;3.22.1'

    - name: Build APK
      run: |
        unzip -q Strato_SC.zip -d extracted_src
        cd extracted_src
        chmod +x gradlew
        ./gradlew assembleDebug -Pandroid.ndkVersion=25.2.9519653 --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Strato-Experimental-APK
        path: "extracted_src/app/build/outputs/apk/debug/*.apk"
