name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make Gradle Executable
      run: find . -name "gradlew" -exec chmod +x {} \;

    - name: Build APK
      run: |
        echo "Unzipping source code..."
        unzip -q Strato_SC.zip -d extracted_src
        
        echo "Checking inside extracted_src:"
        ls -la extracted_src
        
        echo "Searching for any gradle files:"
        find extracted_src -maxdepth 3
        exit 1




    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Strato-Experimental-APK
        path: "**/build/outputs/apk/debug/*.apk"
